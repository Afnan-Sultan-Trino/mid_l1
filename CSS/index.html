<!DOCTYPE html>
<html lang="en">
 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
 
<link rel="stylesheet" href="style.css">
 
</head>
 
<body>
 
<h1>Registration Form</h1>
 
<div class="container">
 
<!-- General Information -->
 
<fieldset class="general">
 
<legend>General Information:</legend>
 
<table>
 
<tr>
<td><b>First Name</b></td>
<td>:</td>
<td><input type="text"></td>
</tr>
 
<tr>
<td><b>Last Name</b></td>
<td>:</td>
<td><input type="text"></td>
</tr>
 
<tr>
<td><b>Gender</b></td>
<td>:</td>
<td>
<input type="radio" name="gender">Male
<input type="radio" name="gender">Female
</td>
</tr>
 
<tr>
<td><b>Father's Name</b></td>
<td>:</td>
<td><input type="text"></td>
<td style="border: 2px solid rgb(153, 149, 149);">
<input type="file">
</td>
</tr>
 

 
<tr>
<td><b>Mother's Name</b></td>
<td>:</td>
<td><input type="text"></td>
</tr>
 
<tr>
<td><b>Blood Group</b></td>
<td>:</td>
<td>
<select>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>
</td>
</tr>
 
<tr>
<td><b>Religion</b></td>
<td>:</td>
<td>
<select>
<option>Islam</option>
<option>Hindu</option>
<option>Christian</option>
<option>Buddhist</option>
</select>
</td>
</tr>
 
</table>
 
</fieldset>
 
<!-- Contact Information -->
 
<fieldset class="contact">
 
<legend>Contact Information:</legend>
 
<table>
 
<tr>
<td><b>Email</b></td>
<td>:</td>
<td><input type="email"></td>
</tr>
 
<tr>
<td><b>Phone/Mobile</b></td>
<td>:</td>
<td><input type="text"></td>
</tr>
 
<tr>
<td><b>Website</b></td>
<td>:</td>
<td><input type="text"></td>
</tr>
 
<tr>
 
<td valign="top"><b>Address</b></td>
<td valign="top">:</td>
 
<td>
 
<fieldset class="address-box" style="border:2px solid #5b7bc6;">
 
<legend>Present Address</legend>
 
<select>
<option>Bangladesh</option>
</select>
 
<select>
<option>Dhaka</option>
</select>
 
<br><br>
 
<textarea placeholder="Road/Street/City"></textarea>
 
<br><br>
 
<input type="text" placeholder="Post Code">
 
</fieldset>
 
</td>
 
</tr>
 
</table>
 
</fieldset>
 
<!-- Account Information -->
 
<div class="account">
 
<fieldset>
    <img src="/Screenshot 2026-07-07 142249.png" class="bg">
 
<legend>Account Information:</legend>
 
<table>
 
<tr>
<td><b>Username</b></td>
<td>:</td>
<td><input type="text"></td>
</tr>
 
<tr>
<td><b>Password</b></td>
<td>:</td>
<td><input type="password"></td>
</tr>
 
<tr>
<td><b>Confirm Password</b></td>
<td>:</td>
<td><input type="password"></td>
</tr>
 
</table>
 
</fieldset>
 
<button class="register">Register</button>
 
</div>
 
</div>
 
</body>
</html>
