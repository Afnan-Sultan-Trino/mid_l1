<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>Registration Form</h1>

    <form class="container" onsubmit="return validate(this);">

        <!-- General Information -->
        <fieldset class="general">
            <legend>General Information:</legend>
            <table>

                <tr>
                    <td><b>First Name</b></td>
                    <td>:</td>
                    <td><input type="text" name="FirstName"></td>
                    <td><span id="FirstNameErrMsg"></span></td>
                </tr>

                <tr>
                    <td><b>Last Name</b></td>
                    <td>:</td>
                    <td><input type="text" name="LastName"></td>
                    <td><span id="LastNameErrMsg"></span></td>
                </tr>

                <tr>
                    <td><b>Gender</b></td>
                    <td>:</td>
                    <td>
                        <input type="radio" name="gender" value="Male">Male
                        <input type="radio" name="gender" value="Female">Female
                        <span id="GenderErrMsg"></span>
                    </td>
                </tr>

                <tr>
                    <td><b>Father's Name</b></td>
                    <td>:</td>
                    <td><input type="text" name="FatherName"></td>
                    <td><span id="FatherNameErrMsg"></span></td>
                    <td style="border: 2px solid rgb(153, 149, 149);">
                        <input type="file" name="fileChoosen">
                        <span id="FileErrMsg"></span>
                    </td>
                </tr>

                <tr>
                    <td><b>Mother's Name</b></td>
                    <td>:</td>
                    <td><input type="text" name="MotherName"></td>
                    <td><span id="MotherNameErrMsg"></span></td>
                </tr>

                <tr>
                    <td><b>Blood Group</b></td>
                    <td>:</td>
                    <td>
                        <select name="BloodGroup">
                            <option value="">-- Select --</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                        <span id="BGErrMsg"></span>
                    </td>
                </tr>

                <tr>
                    <td><b>Religion</b></td>
                    <td>:</td>
                    <td>
                        <select name="Religion">
                            <option value="">-- Select --</option>
                            <option value="Islam">Islam</option>
                            <option value="Hindu">Hindu</option>
                            <option value="Christian">Christian</option>
                            <option value="Buddhist">Buddhist</option>
                        </select>
                        <span id="ReligionErrMsg"></span>
                    </td>
                </tr>

            </table>
        </fieldset>

        <!-- Contact Information -->
        <fieldset class="contact">
            <legend>Contact Information:</legend>
            <table>

                <tr>
                    <td><b>Email</b></td>
                    <td>:</td>
                    <td><input type="email" name="Email"></td>
                    <td><span id="EmailErrMsg"></span></td>
                </tr>

                <tr>
                    <td><b>Phone/Mobile</b></td>
                    <td>:</td>
                    <td><input type="text" name="Phone"></td>
                    <td><span id="PhoneErrMsg"></span></td>
                </tr>

                <tr>
                    <td><b>Website</b></td>
                    <td>:</td>
                    <td><input type="text" name="Website"></td>
                    <td><span id="WebErrMsg"></span></td>
                </tr>

                <tr>
                    <td valign="top"><b>Address</b></td>
                    <td valign="top">:</td>
                    <td>
                        <fieldset class="address-box" style="border:2px solid #5b7bc6;">
                            <legend>Present Address</legend>

                            <select name="Country">
                                <option value="Bangladesh">Bangladesh</option>
                            </select>

                            <select name="City">
                                <option value="Dhaka">Dhaka</option>
                            </select>

                            <br><br>

                            <textarea name="StreetAddress" placeholder="Road/Street/City"></textarea>

                            <br><br>

                            <input type="text" name="PostCode" placeholder="Post Code">

                        </fieldset>
                    </td>
                </tr>

            </table>
        </fieldset>

        <!-- Account Information -->
        <div class="account">
            <fieldset>
                <img src="/Screenshot 2026-07-07 142249.png" class="bg" alt="background">

                <legend>Account Information:</legend>
                <table>

                    <tr>
                        <td><b>Username</b></td>
                        <td>:</td>
                        <td><input type="text" name="Username"></td>
                        <td><span id="UserNameErrMsg"></span></td>
                    </tr>

                    <tr>
                        <td><b>Password</b></td>
                        <td>:</td>
                        <td><input type="password" name="Password"></td>
                        <td><span id="PassErrMsg"></span></td>
                    </tr>

                    <tr>
                        <td><b>Confirm Password</b></td>
                        <td>:</td>
                        <td><input type="password" name="ConfirmPass"></td>
                        <td><span id="ConfirmPassErrMsg"></span></td>
                    </tr>

                </table>
            </fieldset>

            <button class="register" type="submit">Register</button>
        </div>

    </form>

    <script>
        function validate(form) {

            
            const FirstName = form.FirstName.value.trim();
            const LastName = form.LastName.value.trim();
            const FatherName = form.FatherName.value.trim();
            const MotherName = form.MotherName.value.trim();
            const BloodGroup = form.BloodGroup.value;
            const Religion = form.Religion.value;
            const Email = form.Email.value.trim();
            const Phone = form.Phone.value.trim();
            const Website = form.Website.value.trim();
            const Username = form.Username.value.trim();
            const Password = form.Password.value;
            const ConfirmPass = form.ConfirmPass.value;

            
            const genderSelected = form.querySelector('input[name="gender"]:checked');

            let flag = true;

            
            const FirstNameErrMsg = document.getElementById("FirstNameErrMsg");
            const LastNameErrMsg = document.getElementById("LastNameErrMsg");
            const GenderErrMsg = document.getElementById("GenderErrMsg");
            const FatherNameErrMsg = document.getElementById("FatherNameErrMsg");
            const FileErrMsg = document.getElementById("FileErrMsg");
            const MotherNameErrMsg = document.getElementById("MotherNameErrMsg");
            const BGErrMsg = document.getElementById("BGErrMsg");
            const ReligionErrMsg = document.getElementById("ReligionErrMsg");
            const EmailErrMsg = document.getElementById("EmailErrMsg");
            const PhoneErrMsg = document.getElementById("PhoneErrMsg");
            const WebErrMsg = document.getElementById("WebErrMsg");
            const UserNameErrMsg = document.getElementById("UserNameErrMsg");
            const PassErrMsg = document.getElementById("PassErrMsg");
            const ConfirmPassErrMsg = document.getElementById("ConfirmPassErrMsg");

            
            FirstNameErrMsg.innerHTML = "";
            LastNameErrMsg.innerHTML = "";
            GenderErrMsg.innerHTML = "";
            FatherNameErrMsg.innerHTML = "";
            FileErrMsg.innerHTML = "";
            MotherNameErrMsg.innerHTML = "";
            BGErrMsg.innerHTML = "";
            ReligionErrMsg.innerHTML = "";
            EmailErrMsg.innerHTML = "";
            PhoneErrMsg.innerHTML = "";
            WebErrMsg.innerHTML = "";
            UserNameErrMsg.innerHTML = "";
            PassErrMsg.innerHTML = "";
            ConfirmPassErrMsg.innerHTML = "";

            

            if (FirstName === "") {
                FirstNameErrMsg.innerHTML = "Please enter your First Name.";
                flag = false;
            }

            if (LastName === "") {
                LastNameErrMsg.innerHTML = "Please enter your Last Name.";
                flag = false;
            }

            if (!genderSelected) {
                GenderErrMsg.innerHTML = "Please select your Gender.";
                flag = false;
            }

            if (FatherName === "") {
                FatherNameErrMsg.innerHTML = "Please enter your Father's Name.";
                flag = false;
            }

            if (MotherName === "") {
                MotherNameErrMsg.innerHTML = "Please enter your Mother's Name.";
                flag = false;
            }

            if (BloodGroup === "") {
                BGErrMsg.innerHTML = "Please select your Blood Group.";
                flag = false;
            }

            if (Religion === "") {
                ReligionErrMsg.innerHTML = "Please select your Religion.";
                flag = false;
            }

            if (Email === "") {
                EmailErrMsg.innerHTML = "Please enter your Email address.";
                flag = false;
            }

            if (Phone === "") {
                PhoneErrMsg.innerHTML = "Please enter your Phone/Mobile number.";
                flag = false;
            }

        

            if (Username === "") {
                UserNameErrMsg.innerHTML = "Please choose a Username.";
                flag = false;
            }

            if (Password === "") {
                PassErrMsg.innerHTML = "Please enter a Password.";
                flag = false;
            }

            if (ConfirmPass === "") {
                ConfirmPassErrMsg.innerHTML = "Please confirm your Password.";
                flag = false;
            }

            if (Password !== "" && ConfirmPass !== "" && Password !== ConfirmPass) {
                ConfirmPassErrMsg.innerHTML = "Passwords do not match!";
                flag = false;
            }

            return flag; 
        }
    </script>

</body>

</html>
