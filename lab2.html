<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task 2</title>
</head>
<body>
    <h1>Registration</h1>
    <table>
        <tr>
            <td align="left">
            <fieldset>
                <legend>General Information :</legend>
                
                <table >
                    
                    <tr> 
                    <td><b>First   </b><br><b>Name</b> </td>
                    <td> :</td>
                    <td><input type="text"></td>
                    </tr> 


                    <tr> 
                    <td><b>Last   </b><br><b>Name</b> </td>
                    <td> :</td>
                    <td><input type="text"></td>
                    </tr> 
                    
                    <tr>
                    <td><b>Gender :</b></td>
                    <td><input type="radio" name="gender">Male</td>
                    <td><input type="radio" name="gender" >Female</td>
                    </tr>


                    <tr> 
                    <td><b>Father's   </b><br><b>Name</b> </td>
                    <td> :</td>
                    <td><input type="text"></td>
                    <td><input type="file"></td>
                    </tr> 

                    <tr> 
                    <td><b>Mother's   </b><br><b>Name</b> </td>
                    <td> :</td>
                    <td><input type="text"></td>
                    </tr> 
                    

                    <tr>
                    <td><b>Blood   :</b><br><b>Group </b></td>
                    <td><select>
                        <option>A+</option>
                        <option>B+</option>
                        <option>O+</option>
                        <option>AB+</option>
                    </select>
                    </td>
                    </tr>


                    <tr>
                    <td><b>Religion </b></td>
                    <td><select>
                        <option>Islam</option>
                        <option>Hindu</option>
                        <option>Buddha</option>
                        <option>Christan</option>
                    </select>
                    </td>
                    </tr>
                    </table>
            </fieldset>
            </td>






            <td align="right">
            <fieldset>
                <legend>Contact Information :</legend>
                
                <table cellpadding="6">
                    
                        
                    <label><b>Email   :</b> </label>
                    <input type="email">
                    <br> <br>
                    

                    <label><b>Phone/Mobile   :</b></label>
                    <input type="text">
                    <br> <br>

                    <label><b>Website   :</b></label>
                    <input type="text">
                    <br> <br>


                    <table>
                        <tr>
                            <td>
                    <label><b>Address   :</b></label>
                    </td>
                    <td>
                    <fieldset>
                        <legend>Present Address</legend>
                        
                                <select>
                                    <option>Bangladesh</option>
                                </select>
                            
                                <select>
                                    <option>Dhaka</option>
                                </select>
                                <br>
                                <textarea>Road/Street/City</textarea>
                                <br>
                                <input type="text" value="Post Code">
                            
                    </fieldset>
                    </td>

                    </tr>
                    </table>
                    </table>
            </fieldset>
            </td>

            





            
        </tr>
    </table>
</body>
</html>
